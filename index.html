<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to SecurityBot.gg...</title>
    
    <!-- Instant redirect (0 seconds) -->
    <meta http-equiv="refresh" content="0; url=https://securitybot.gg">
    
    <!-- Fallback JavaScript redirect (in case meta refresh is blocked) -->
    <script>
        window.onload = function() {
            window.location.href = "https://securitybot.gg";
        };
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        
        .container {
            max-width: 400px;
            padding: 40px 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #00ff9d;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.5);
            animation: pulse 2s infinite;
        }
        
        h1 {
            font-size: 28px;
            margin: 0 0 12px;
            font-weight: 500;
        }
        
        p {
            font-size: 17px;
            opacity: 0.8;
            margin: 0 0 40px;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #00ff9d;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 150ms; }
        .dot:nth-child(3) { animation-delay: 300ms; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
        }
        
        a {
            color: #00ff9d;
            text-decoration: none;
            font-weight: 500;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        <h1>Redirecting to SecurityBot.gg</h1>
        <p>You are being automatically redirected to the official SecurityBot.gg website.</p>
        
        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <p style="margin-top: 60px; font-size: 14px; opacity: 0.6;">
            Not redirected? <a href="https://securitybot.gg">Click here</a>
        </p>
    </div>
</body>
</html>
